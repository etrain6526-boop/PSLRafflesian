<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSL Toolkit</title>
    <style>
        :root {
            --bg-earth: #EAE3D9;
            --card-tan: #D9D2C5;
            --moss-green: #4A5D4C;
            --moss-translucent: rgba(74, 93, 76, 0.3);
            --light-green: #8BA18E;
            --text-dark: #2F3630;
            --shadow: 6px 6px 15px rgba(0,0,0,0.1), -6px -6px 15px rgba(255,255,255,0.5);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-earth);
            color: var(--text-dark);
            margin: 0; padding: 0;
            display: flex; justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .vine-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: -1; opacity: 0.3;
        }

        #app-container { width: 100%; max-width: 450px; padding: 20px; box-sizing: border-box; }

        .card {
            background: var(--card-tan); border-radius: 25px; padding: 25px;
            box-shadow: var(--shadow); margin-bottom: 20px; border: 1px solid rgba(0,0,0,0.05);
        }

        .home-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-staff {
            background: var(--moss-green); color: white; padding: 6px 12px;
            border-radius: 8px; font-size: 0.75rem; cursor: pointer; border: none;
            width: auto; min-width: 80px; transition: 0.3s;
        }

        .toolkit-item {
            background: var(--moss-green); color: white; padding: 22px;
            border-radius: 20px; margin-bottom: 15px; cursor: pointer; text-align: center; font-weight: bold;
        }

        button {
            border: none; border-radius: 15px; padding: 16px; font-weight: 600; cursor: pointer;
            width: 100%; margin: 8px 0; font-size: 1rem; transition: 0.3s;
        }

        .btn-primary { background: var(--moss-green); color: white; }
        .btn-secondary { background: var(--light-green); color: white; }

        input, select, textarea {
            width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px;
            border: 1px solid #ccc; background: #fdfdfd; box-sizing: border-box;
        }

        .mood-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .mood-btn {
            background: var(--bg-earth); padding: 15px; border-radius: 15px;
            border: 2px solid transparent; text-align: center; cursor: pointer;
        }
        .mood-btn.selected { border-color: var(--moss-green); background: var(--light-green); color: white; }

        nav {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; background: var(--moss-green);
            border-radius: 30px; padding: 10px; display: flex; justify-content: space-around;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); z-index: 1000;
        }
        nav button { background: none; box-shadow: none; width: 60px; height: 50px; color: rgba(255,255,255,0.6); font-size: 1.5rem; }
        nav button.active-nav { color: white; }

        .screen { display: none; padding-bottom: 120px; animation: fadeIn 0.4s; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Practice Overlay Fixes */
        #practice-overlay {
            position: fixed; top:0; left:0; width: 100%; height: 100%;
            background: var(--bg-earth); z-index: 2000; display: none; flex-direction: column;
        }
        .practice-section-header { flex: 0 0 15%; display: flex; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .practice-section-body { 
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            padding: 40px; position: relative; overflow: visible; /* Changed to visible to prevent circle cutting */
        }
        .practice-section-footer { flex: 0 0 25%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        
        #practice-instruction {
            position: absolute; z-index: 10; text-align: center;
            font-size: 1.8rem; font-weight: bold; color: var(--text-dark);
            text-shadow: 0 0 10px white;
        }

        #breathing-box {
            width: 220px; height: 220px; border: 4px solid var(--moss-translucent);
            position: relative; display: none;
        }
        #guiding-orb {
            width: 24px; height: 24px; background: var(--moss-green); border-radius: 50%;
            position: absolute; top: -14px; left: -14px; box-shadow: 0 0 15px var(--moss-green);
        }

        #breath-circle {
            width: 150px; height: 150px; background: var(--moss-translucent);
            border-radius: 50%; transition: transform 4s ease-in-out; display: none;
        }
    </style>
</head>
<body>

    <svg class="vine-bg" viewBox="0 0 100 100" preserveAspectRatio="none">
        <path d="M-5,10 Q15,5 30,25 T60,10 T105,30" stroke="#4A5D4C" fill="none" stroke-width="0.3" />
        <path d="M105,70 Q80,85 50,65 T0,90" stroke="#4A5D4C" fill="none" stroke-width="0.2" />
        <path d="M10,0 L15,15 Q30,40 10,60" stroke="#4A5D4C" fill="none" stroke-width="0.15" />
        <path d="M90,0 Q70,30 90,60 T80,100" stroke="#4A5D4C" fill="none" stroke-width="0.2" />
        <path d="M0,50 Q40,40 100,50" stroke="#4A5D4C" fill="none" stroke-width="0.1" />
    </svg>

    <div id="app-container">
        <div id="screen-onboarding" class="screen">
            <div class="card">
                <h2>Welcome</h2>
                <input type="text" id="user-name" placeholder="Full Name">
                <select id="user-level">
                    <option value="">Select Year</option>
                    <option value="Year 1">Year 1</option><option value="Year 2">Year 2</option>
                    <option value="Year 3">Year 3</option><option value="Year 4">Year 4</option>
                </select>
                <button class="btn-primary" onclick="saveProfile()">Get Started</button>
            </div>
        </div>

        <div id="screen-home" class="screen">
            <div class="home-header">
                <h2 id="welcome-text" style="margin:0;">Hi</h2>
                <button class="btn-staff" onclick="showScreen('screen-staff')">For Staff</button>
            </div>
            <div class="card">
                <h3 style="margin-top:0;">Overall Mood Average</h3>
                <div id="mood-stat-container" style="font-size: 3rem; font-weight: bold; text-align: center; color: var(--moss-green);">--</div>
                <p id="mood-stat-count" style="text-align: center; opacity: 0.7;">Establish baseline (3 logs)...</p>
            </div>
            <button class="btn-primary" onclick="showScreen('screen-log')">Record Support Session</button>
            <button class="btn-secondary" onclick="showScreen('screen-mood')">Log My Mood</button>
        </div>

        <div id="screen-log" class="screen">
            <div class="card">
                <h3>Session Log</h3>
                <input type="date" id="log-date">
                <input type="number" id="log-peers" placeholder="Number of peers supported">
                <select id="log-type">
                    <option value="Emotional support">Emotional support</option>
                    <option value="Relational support">Relational support</option>
                    <option value="Navigational support">Navigational support</option>
                    <option value="Proactive support">Proactive support</option>
                </select>
                <button class="btn-primary" onclick="saveLog()">Save Log</button>
                <button onclick="showScreen('screen-home')">Cancel</button>
            </div>
        </div>

        <div id="screen-mood" class="screen">
            <div class="card">
                <h3>Mood Check-in</h3>
                <div class="mood-grid" id="mood-grid-container"></div>
                <textarea id="mood-reason" placeholder="Mandatory: Why are you feeling this way?" rows="3" style="margin-top:20px;"></textarea>
                <button id="mood-submit-btn" class="btn-primary" style="opacity: 0.5;" disabled onclick="submitMood()">Submit Mood</button>
            </div>
        </div>

        <div id="screen-library" class="screen">
            <h2>Regulation Toolkit</h2>
            <div class="toolkit-item" onclick="openPractice('box')">Box Breathing</div>
            <div class="toolkit-item" onclick="openPractice('478')">4-7-8 Breathing</div>
        </div>

        <div id="screen-staff" class="screen">
            <div class="card">
                <h3>Staff Data Portal</h3>
                <input type="password" id="staff-pw" placeholder="Enter Staff Password">
                <button class="btn-primary" onclick="exportData()">Download Report</button>
                <button onclick="showScreen('screen-home')">Back</button>
            </div>
        </div>

        <nav id="main-nav" style="display:none;">
            <button id="nav-home" onclick="showScreen('screen-home')">🏠</button>
            <button id="nav-lib" onclick="showScreen('screen-library')">🌿</button>
        </nav>
    </div>

    <div id="practice-overlay">
        <div class="practice-section-header">
            <h2 id="practice-title" style="margin:0;">Technique</h2>
        </div>
        <div class="practice-section-body">
            <div id="practice-instruction">Ready?</div>
            <div id="breathing-box"><div id="guiding-orb"></div></div>
            <div id="breath-circle"></div>
        </div>
        <div class="practice-section-footer">
            <button id="start-practice-btn" class="btn-primary" style="width: 240px;" onclick="startActivity()">Start</button>
            <button id="exit-practice-btn" class="btn-primary" style="width: 240px;" onclick="closePractice()">Exit</button>
        </div>
    </div>

    <script>
        let logs = JSON.parse(localStorage.getItem('psl_logs_v8')) || [];
        let moods = JSON.parse(localStorage.getItem('psl_moods_v8')) || [];
        let user = JSON.parse(localStorage.getItem('psl_user_v8')) || null;

        const moodOptions = ["Drained", "Exhausted", "Bored", "Jaded", "Calm", "Content", "Happy", "Relaxed", "Motivated", "Confident"];
        const moodMap = { "Drained":1, "Exhausted":1, "Bored":2, "Jaded":2, "Calm":3, "Content":3, "Happy":4, "Relaxed":4, "Motivated":5, "Confident":5 };
        let selectedMoodLabel = null;

        window.onload = () => {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('log-date').setAttribute('max', today);
            document.getElementById('log-date').value = today;
            if (!user) { showScreen('screen-onboarding'); } 
            else { 
                document.getElementById('main-nav').style.display = 'flex';
                document.getElementById('welcome-text').innerText = `Hi ${user.name}`;
                updateDashboard();
                showScreen('screen-home');
            }
            renderMoodGrid();
        };

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-nav'));
            document.getElementById(id).classList.add('active');
            if(id === 'screen-home') document.getElementById('nav-home').classList.add('active-nav');
            if(id === 'screen-library') document.getElementById('nav-lib').classList.add('active-nav');
            window.scrollTo(0,0);
        }

        function saveProfile() {
            const name = document.getElementById('user-name').value;
            const level = document.getElementById('user-level').value;
            if (name && level) {
                user = { name, level };
                localStorage.setItem('psl_user_v8', JSON.stringify(user));
                location.reload();
            }
        }

        function renderMoodGrid() {
            const container = document.getElementById('mood-grid-container');
            moodOptions.forEach(m => {
                const btn = document.createElement('div');
                btn.className = 'mood-btn'; btn.innerText = m;
                btn.onclick = () => {
                    document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected'); selectedMoodLabel = m; checkMoodValidity();
                };
                container.appendChild(btn);
            });
            document.getElementById('mood-reason').oninput = checkMoodValidity;
        }

        function checkMoodValidity() {
            const btn = document.getElementById('mood-submit-btn');
            const reason = document.getElementById('mood-reason').value;
            if (selectedMoodLabel && reason.trim().length > 2) {
                btn.style.opacity = 1; btn.disabled = false;
            } else { btn.style.opacity = 0.5; btn.disabled = true; }
        }

        function submitMood() {
            moods.push({ val: moodMap[selectedMoodLabel], label: selectedMoodLabel, reason: document.getElementById('mood-reason').value, date: new Date().toISOString() });
            localStorage.setItem('psl_moods_v8', JSON.stringify(moods));
            updateDashboard(); showScreen('screen-home');
            document.getElementById('mood-reason').value = "";
        }

        function updateDashboard() {
            if (moods.length < 3) {
                document.getElementById('mood-stat-container').innerText = "--";
            } else {
                const avg = (moods.reduce((a,b) => a + b.val, 0) / moods.length).toFixed(1);
                document.getElementById('mood-stat-container').innerText = avg;
                document.getElementById('mood-stat-count').innerText = `Based on ${moods.length} logs`;
            }
        }

        function saveLog() {
            const peers = document.getElementById('log-peers').value;
            if (!peers) { alert("Enter number of peers."); return; }
            logs.push({ date: document.getElementById('log-date').value, peers: parseInt(peers), type: document.getElementById('log-type').value });
            localStorage.setItem('psl_logs_v8', JSON.stringify(logs));
            showScreen('screen-home');
        }

        // --- REGULATION LOGIC ---
        let practiceMode = "";
        let pTimer = null;

        function openPractice(mode) {
            practiceMode = mode;
            document.getElementById('practice-overlay').style.display = 'flex';
            document.getElementById('practice-title').innerText = (mode === 'box') ? "Box Breathing" : "4-7-8 Breathing";
            document.getElementById('start-practice-btn').style.display = 'block';
            document.getElementById('practice-instruction').innerText = "Begin Practice";
            document.getElementById('breathing-box').style.display = 'none';
            document.getElementById('breath-circle').style.display = 'none';
        }

        function closePractice() { clearInterval(pTimer); document.getElementById('practice-overlay').style.display = 'none'; }

        function startActivity() {
            document.getElementById('start-practice-btn').style.display = 'none';
            const txt = document.getElementById('practice-instruction');
            clearInterval(pTimer);

            if (practiceMode === 'box') {
                document.getElementById('breathing-box').style.display = 'block';
                const orb = document.getElementById('guiding-orb');
                const path = ["top:-14px; left:-14px;", "top:-14px; left:210px;", "top:210px; left:210px;", "top:210px; left:-14px;"];
                const cues = ["Inhale", "Hold", "Exhale", "Hold"];
                let s = 0;
                const step = () => {
                    txt.innerText = cues[s % 4];
                    orb.style.cssText = path[s % 4] + " transition: all 4s linear;";
                    s++;
                };
                step();
                pTimer = setInterval(step, 4000);
            } else {
                document.getElementById('breath-circle').style.display = 'block';
                const circle = document.getElementById('breath-circle');
                const run478 = () => {
                    txt.innerText = "Inhale"; circle.style.transform = "scale(2.0)";
                    setTimeout(() => {
                        txt.innerText = "Hold";
                        setTimeout(() => {
                            txt.innerText = "Exhale"; circle.style.transform = "scale(0.8)";
                        }, 7000);
                    }, 4000);
                };
                run478();
                pTimer = setInterval(run478, 19500);
            }
        }

        function exportData() {
            if (document.getElementById('staff-pw').value !== "PSL2026") { alert("Access Denied"); return; }
            const avg = moods.length > 0 ? (moods.reduce((a,b) => a + b.val, 0) / moods.length).toFixed(2) : "N/A";
            let csv = "\ufeffPSL Name," + user.name + "\nLevel," + user.level + "\nAverage Mood," + avg + "\n\n";
            csv += "MOOD RECORDS\nDate,Mood,Reason\n";
            moods.forEach(m => csv += `${m.date},${m.label},"${m.reason.replace(/"/g, '""')}"\n`);
            csv += "\nSESSION LOGS\nDate,Peers,Type\n";
            logs.forEach(l => csv += `${l.date},${l.peers},${l.type}\n`);
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `Report_${user.name}.csv`; a.click();
        }
    </script>
</body>
</html>
