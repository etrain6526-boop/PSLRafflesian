<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSL Tracker</title>
    <style>
        :root {
            --bg-earth: #EAE3D9;
            --glass-tan: rgba(217, 210, 197, 0.85);
            --moss-green: #4A5D4C;
            --light-green: #8BA18E;
            --ladybug-red: #A34A4A;
            --text-dark: #2F3630;
            --shadow: 10px 10px 20px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-earth);
            color: var(--text-dark);
            margin: 0; padding: 0;
            display: flex; justify-content: center;
            min-height: 100vh; overflow-x: hidden;
        }

        /* --- MAXIMALIST NATURE BACKGROUND --- */
        .nature-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: -1;
        }

        #app-container { width: 100%; max-width: 450px; padding: 20px; box-sizing: border-box; z-index: 10; }

        .card {
            background: var(--glass-tan);
            backdrop-filter: blur(8px);
            border-radius: 30px; padding: 25px;
            box-shadow: var(--shadow); margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.4);
            position: relative;
        }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-card {
            background: rgba(255, 255, 255, 0.4); padding: 15px; border-radius: 20px;
            text-align: center; border: 1px solid rgba(255,255,255,0.5);
        }
        .stat-val { font-size: 1.8rem; font-weight: bold; color: var(--moss-green); display: block; }
        .stat-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; }

        /* SECRET STAFF BUTTON (Ladybug) */
        .staff-secret {
            position: absolute; bottom: 12px; right: 20px;
            width: 12px; height: 10px; background: var(--ladybug-red);
            border-radius: 50%; cursor: pointer; opacity: 0.6;
            transition: opacity 0.3s;
        }
        .staff-secret::after {
            content: ''; position: absolute; top: 2px; left: 5px;
            width: 2px; height: 2px; background: black; border-radius: 50%;
            box-shadow: 2px 2px 0 black, -2px 3px 0 black;
        }

        button {
            border: none; border-radius: 18px; padding: 18px; font-weight: 600; 
            cursor: pointer; width: 100%; margin: 8px 0; font-size: 1rem; transition: 0.3s;
        }
        .btn-primary { background: var(--moss-green); color: white; }
        .btn-secondary { background: var(--light-green); color: white; }

        .mood-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .mood-btn {
            background: white; padding: 15px; border-radius: 15px;
            border: 2px solid transparent; text-align: center; cursor: pointer;
        }
        .mood-btn.selected { border-color: var(--moss-green); background: var(--light-green); color: white; }

        input, select, textarea {
            width: 100%; padding: 15px; margin: 10px 0; border-radius: 15px;
            border: 1px solid #ccc; background: rgba(255,255,255,0.8); box-sizing: border-box;
        }

        nav {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 380px; background: var(--moss-green);
            border-radius: 35px; padding: 12px; display: flex; justify-content: space-around;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2); z-index: 1000;
        }
        nav button { background: none; box-shadow: none; width: 50px; height: 50px; color: rgba(255,255,255,0.5); font-size: 1.4rem; padding:0; margin:0;}
        nav button.active-nav { color: white; }

        .screen { display: none; padding-bottom: 120px; animation: slideUp 0.5s ease; }
        .screen.active { display: block; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* Breathing Overlay */
        #practice-overlay {
            position: fixed; top:0; left:0; width: 100%; height: 100%;
            background: var(--bg-earth); z-index: 2000; display: none; flex-direction: column;
        }
        .p-body { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        #p-instruction { font-size: 2rem; font-weight: bold; position: absolute; z-index: 10; }
        #b-circle { width: 200px; height: 200px; background: rgba(74, 93, 76, 0.2); border-radius: 50%; transition: transform 4s ease-in-out; display: none; }
        #b-box { width: 240px; height: 240px; border: 4px solid rgba(74, 93, 76, 0.2); position: relative; display: none; }
        #orb { width: 24px; height: 24px; background: var(--moss-green); border-radius: 50%; position: absolute; top: -14px; left: -14px; }
    </style>
</head>
<body>

    <svg class="nature-layer" viewBox="0 0 100 100" preserveAspectRatio="none">
        <path d="M-5,30 Q10,10 30,25 T60,5 T90,20" stroke="#4A5D4C" fill="none" stroke-width="0.3" />
        <path d="M105,40 Q85,15 65,35 T30,10" stroke="#4A5D4C" fill="none" stroke-width="0.25" opacity="0.6"/>
        <path d="M-10,95 Q20,70 50,90 T110,80" stroke="#38493A" fill="none" stroke-width="0.4" />
        <g fill="#D48E8E" opacity="0.8">
            <circle cx="5" cy="92" r="2"/><circle cx="12" cy="93" r="2"/><circle cx="48" cy="91" r="2"/><circle cx="95" cy="95" r="2.5"/>
        </g>
        <g stroke="#4A5D4C" fill="none" stroke-width="0.4">
            <path d="M70,15 Q72,13 74,15 M74,15 Q76,17 78,15" />
            <path d="M20,50 Q22,48 24,50 M24,50 Q26,52 28,50" opacity="0.4" />
        </g>
    </svg>

    <div id="app-container">
        <!-- Setup Screen -->
        <div id="screen-setup" class="screen">
            <div class="card" style="text-align: center;">
                <h2>PSL Tracker</h2>
                <input type="text" id="set-name" placeholder="Full Name">
                <select id="set-level">
                    <option value="">Select Year</option>
                    <option value="Year 1">Year 1</option><option value="Year 2">Year 2</option>
                    <option value="Year 3">Year 3</option><option value="Year 4">Year 4</option>
                </select>
                <button class="btn-primary" onclick="initUser()">Start Tracker</button>
            </div>
        </div>

        <!-- Dashboard -->
        <div id="screen-home" class="screen">
            <h2 id="greet">Hi</h2>
            <div class="stat-grid">
                <div class="stat-card">
                    <span class="stat-val" id="stat-sessions">0</span>
                    <span class="stat-label">Logs</span>
                </div>
                <div class="stat-card">
                    <span class="stat-val" id="stat-peers">0</span>
                    <span class="stat-label">Peers</span>
                </div>
            </div>
            <div class="card" style="text-align: center; padding-bottom: 40px;">
                <span class="stat-label">Wellbeing Score</span>
                <span class="stat-val" id="stat-mood" style="font-size: 3.5rem;">--</span>
                <div class="staff-secret" onclick="showScreen('screen-staff')"></div>
            </div>
            <button class="btn-primary" onclick="showScreen('screen-log')">Record Support Session</button>
            <button class="btn-secondary" onclick="showScreen('screen-mood')">Log My Mood</button>
        </div>

        <!-- Log Session -->
        <div id="screen-log" class="screen">
            <div class="card">
                <h3>Session Log</h3>
                <p style="background: rgba(255,255,255,0.5); padding: 10px; border-radius: 12px; font-size: 0.8rem; color: #721c24;">
                    <strong>Notice:</strong> Strictly do not include peer names or class information.
                </p>
                <label>Date</label>
                <input type="date" id="log-date">
                <input type="number" id="log-peers" placeholder="Peers Supported">
                <select id="log-type">
                    <option value="Emotional support">Emotional support</option>
                    <option value="Relational support">Relational support</option>
                    <option value="Navigational support">Navigational support</option>
                    <option value="Proactive support">Proactive support</option>
                </select>
                <textarea id="log-reflect" rows="4" placeholder="Mandatory Reflection..."></textarea>
                <button class="btn-primary" onclick="saveSession()">Save Entry</button>
                <button onclick="showScreen('screen-home')">Cancel</button>
            </div>
        </div>

        <!-- Mood Track -->
        <div id="screen-mood" class="screen">
            <div class="card">
                <h3>Current Mood</h3>
                <div class="mood-grid" id="mood-options-container"></div>
                <textarea id="mood-reflect" rows="3" style="margin-top:20px;" placeholder="Mandatory: Why do you feel this way?"></textarea>
                <button class="btn-primary" id="mood-submit" disabled onclick="saveMoodEntry()">Save Mood</button>
                <button onclick="showScreen('screen-home')">Cancel</button>
            </div>
        </div>

        <!-- Toolkit -->
        <div id="screen-library" class="screen">
            <h2>Toolkit</h2>
            <div class="card" onclick="openPractice('box')"><h3>Box Breathing</h3></div>
            <div class="card" onclick="openPractice('478')"><h3>4-7-8 Breathing</h3></div>
        </div>

        <!-- Staff Portal -->
        <div id="screen-staff" class="screen">
            <div class="card" style="text-align: center;">
                <h2>Administrative</h2>
                <p>Generate Excel report for Supervisor review.</p>
                <button class="btn-primary" onclick="exportToExcel()">Generate Report</button>
                <button onclick="showScreen('screen-home')">Back</button>
            </div>
        </div>

        <nav id="main-nav" style="display:none;">
            <button id="nav-home" onclick="showScreen('screen-home')">🏠</button>
            <button id="nav-lib" onclick="showScreen('screen-library')">🌿</button>
        </nav>
    </div>

    <!-- Practice Overlay -->
    <div id="practice-overlay">
        <div class="p-body">
            <div id="p-instruction">Ready?</div>
            <div id="b-box"><div id="orb"></div></div>
            <div id="b-circle"></div>
        </div>
        <!-- Centered Buttons in Footer -->
        <div style="padding: 40px; text-align: center;">
            <button id="p-start" class="btn-primary" style="width: 200px; margin: 8px auto; display: block;" onclick="beginActivity()">Start</button>
            <button class="btn-secondary" style="width: 200px; margin: 8px auto; display: block;" onclick="closePractice()">Exit</button>
        </div>
    </div>

    <script>
        let db;
        const request = indexedDB.open("PSLTracker_Final_Update", 1);

        request.onupgradeneeded = (e) => {
            db = e.target.result;
            db.createObjectStore("sessions", { autoIncrement: true });
            db.createObjectStore("moods", { autoIncrement: true });
            db.createObjectStore("user", { keyPath: "id" });
        };

        request.onsuccess = (e) => {
            db = e.target.result;
            checkUser();
        };

        function checkUser() {
            db.transaction("user").objectStore("user").get(1).onsuccess = (e) => {
                if (e.target.result) {
                    window.currentUser = e.target.result;
                    document.getElementById('main-nav').style.display = 'flex';
                    document.getElementById('greet').innerText = `Hi ${window.currentUser.name}`;
                    updateDashboardStats();
                    showScreen('screen-home');
                } else { showScreen('screen-setup'); }
            };
        }

        function initUser() {
            const name = document.getElementById('set-name').value;
            const level = document.getElementById('set-level').value;
            if (name && level) {
                const tx = db.transaction("user", "readwrite");
                tx.objectStore("user").put({ id: 1, name, level });
                tx.oncomplete = () => location.reload();
            }
        }

        async function updateDashboardStats() {
            db.transaction("sessions").objectStore("sessions").getAll().onsuccess = (e) => {
                document.getElementById('stat-sessions').innerText = e.target.result.length;
                document.getElementById('stat-peers').innerText = e.target.result.reduce((a, b) => a + parseInt(b.peers || 0), 0);
            };
            db.transaction("moods").objectStore("moods").getAll().onsuccess = (e) => {
                const data = e.target.result;
                if (data.length >= 3) {
                    document.getElementById('stat-mood').innerText = (data.reduce((a, b) => a + b.val, 0) / data.length).toFixed(1);
                }
            };
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-nav'));
            document.getElementById(id).classList.add('active');
            if(id === 'screen-home') document.getElementById('nav-home').classList.add('active-nav');
            if(id === 'screen-library') document.getElementById('nav-lib').classList.add('active-nav');
            if(id === 'screen-mood') prepareMoodGrid();
            if(id === 'screen-log') document.getElementById('log-date').valueAsDate = new Date();
        }

        const moodsArray = [{v:1, l:"Drained"}, {v:1, l:"Exhausted"}, {v:2, l:"Bored"}, {v:2, l:"Jaded"}, {v:3, l:"Calm"}, {v:3, l:"Content"}, {v:4, l:"Happy"}, {v:4, l:"Relaxed"}, {v:5, l:"Motivated"}, {v:5, l:"Confident"}];
        let selectedMood = null;

        function prepareMoodGrid() {
            const container = document.getElementById('mood-options-container');
            container.innerHTML = "";
            [...moodsArray].sort(() => Math.random() - 0.5).forEach(m => {
                const b = document.createElement('div');
                b.className = 'mood-btn'; b.innerText = m.l;
                b.onclick = () => {
                    document.querySelectorAll('.mood-btn').forEach(x => x.classList.remove('selected'));
                    b.classList.add('selected'); selectedMood = m; validateMood();
                };
                container.appendChild(b);
            });
            document.getElementById('mood-reflect').oninput = validateMood;
        }

        function validateMood() {
            document.getElementById('mood-submit').disabled = !(selectedMood && document.getElementById('mood-reflect').value.trim().length > 3);
        }

        function saveMoodEntry() {
            const tx = db.transaction("moods", "readwrite");
            tx.objectStore("moods").add({ val: selectedMood.v, label: selectedMood.l, reflection: document.getElementById('mood-reflect').value, date: new Date().toISOString() });
            tx.oncomplete = () => { updateDashboardStats(); showScreen('screen-home'); };
        }

        function saveSession() {
            const peers = document.getElementById('log-peers').value;
            const reflect = document.getElementById('log-reflect').value;
            if (!peers || reflect.trim().length < 5) { alert("Please complete reflection."); return; }
            const tx = db.transaction("sessions", "readwrite");
            tx.objectStore("sessions").add({ date: document.getElementById('log-date').value, peers: peers, type: document.getElementById('log-type').value, reflection: reflect });
            tx.oncomplete = () => { updateDashboardStats(); showScreen('screen-home'); };
        }

        let pMode = ""; let pTimer = null;
        function openPractice(m) { pMode = m; document.getElementById('practice-overlay').style.display = 'flex'; resetP(); }
        function closePractice() { clearInterval(pTimer); document.getElementById('practice-overlay').style.display = 'none'; }
        function resetP() { document.getElementById('p-start').style.display = 'block'; document.getElementById('b-box').style.display = 'none'; document.getElementById('b-circle').style.display = 'none'; document.getElementById('p-instruction').innerText = "Focus"; }
        
        function beginActivity() {
            document.getElementById('p-start').style.display = 'none';
            const txt = document.getElementById('p-instruction');
            if(pMode === 'box') {
                document.getElementById('b-box').style.display = 'block';
                const orb = document.getElementById('orb');
                const path = ["top:-14px; left:-14px;", "top:-14px; left:210px;", "top:210px; left:210px;", "top:210px; left:-14px;"];
                const cues = ["Inhale", "Hold", "Exhale", "Hold"];
                let s = 0;
                const step = () => { txt.innerText = cues[s % 4]; orb.style.cssText = path[s % 4] + " transition: all 4s linear;"; s++; };
                step(); pTimer = setInterval(step, 4000);
            } else {
                document.getElementById('b-circle').style.display = 'block';
                const c = document.getElementById('b-circle');
                const run = () => {
                    txt.innerText = "Inhale"; c.style.transform = "scale(2.0)";
                    setTimeout(() => { txt.innerText = "Hold"; setTimeout(() => { txt.innerText = "Exhale"; c.style.transform = "scale(0.8)"; }, 7000); }, 4000);
                };
                run(); pTimer = setInterval(run, 19500);
            }
        }

        function exportToExcel() {
            const sStore = db.transaction("sessions").objectStore("sessions").getAll();
            const mStore = db.transaction("moods").objectStore("moods").getAll();

            sStore.onsuccess = () => {
                mStore.onsuccess = () => {
                    const sessionData = sStore.result;
                    const moodData = mStore.result;
                    const totalPeers = sessionData.reduce((a, b) => a + parseInt(b.peers || 0), 0);
                    const avgMood = moodData.length > 0 ? (moodData.reduce((a, b) => a + b.val, 0) / moodData.length).toFixed(2) : "N/A";

                    let xml = `<?xml version="1.0"?><Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet"><Worksheet ss:Name="PSL Report"><Table>`;
                    xml += `<Row><Cell><Data ss:Type="String">PSL NAME:</Data></Cell><Cell><Data ss:Type="String">${window.currentUser.name}</Data></Cell></Row>`;
                    xml += `<Row><Cell><Data ss:Type="String">LEVEL:</Data></Cell><Cell><Data ss:Type="String">${window.currentUser.level}</Data></Cell></Row>`;
                    xml += `<Row><Cell><Data ss:Type="String">TOTAL PEERS SUPPORTED:</Data></Cell><Cell><Data ss:Type="Number">${totalPeers}</Data></Cell></Row>`;
                    xml += `<Row><Cell><Data ss:Type="String">OVERALL MOOD AVERAGE:</Data></Cell><Cell><Data ss:Type="Number">${avgMood}</Data></Cell></Row>`;
                    xml += `<Row></Row>`;
                    xml += `<Row><Cell><Data ss:Type="String">PEER SUPPORT LOGS</Data></Cell></Row>`;
                    xml += `<Row><Cell><Data ss:Type="String">Date</Data></Cell><Cell><Data ss:Type="String">Peers Supported</Data></Cell><Cell><Data ss:Type="String">Type</Data></Cell><Cell><Data ss:Type="String">Reflection</Data></Cell></Row>`;
                    sessionData.forEach(s => {
                        xml += `<Row><Cell><Data ss:Type="String">${s.date}</Data></Cell><Cell><Data ss:Type="Number">${s.peers}</Data></Cell><Cell><Data ss:Type="String">${s.type}</Data></Cell><Cell><Data ss:Type="String">${s.reflection.replace(/[<>&'"]/g, '')}</Data></Cell></Row>`;
                    });
                    xml += `<Row></Row>`;
                    xml += `<Row><Cell><Data ss:Type="String">MOOD & WELLBEING LOGS</Data></Cell></Row>`;
                    xml += `<Row><Cell><Data ss:Type="String">Date</Data></Cell><Cell><Data ss:Type="String">Mood Label</Data></Cell><Cell><Data ss:Type="String">Mood Value</Data></Cell><Cell><Data ss:Type="String">Reason (Reflection)</Data></Cell></Row>`;
                    moodData.forEach(m => {
                        xml += `<Row><Cell><Data ss:Type="String">${m.date.split('T')[0]}</Data></Cell><Cell><Data ss:Type="String">${m.label}</Data></Cell><Cell><Data ss:Type="Number">${m.val}</Data></Cell><Cell><Data ss:Type="String">${m.reflection.replace(/[<>&'"]/g, '')}</Data></Cell></Row>`;
                    });
                    xml += `</Table></Worksheet></Workbook>`;
                    const a = document.createElement("a");
                    a.href = URL.createObjectURL(new Blob([xml], { type: "application/vnd.ms-excel" }));
                    a.download = `PSL_Report_${window.currentUser.name.replace(/ /g, '_')}.xls`;
                    a.click();
                };
            };
        }
    </script>
</body>
</html>
